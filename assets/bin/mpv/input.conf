# Key bindings send script messages to fynix-osc.lua
# This is the standard mpv pattern for script-based input handling
ENTER      script-message fynix-osc-key enter
KP_ENTER   script-message fynix-osc-key enter
SPACE      script-message fynix-osc-key space
LEFT       script-message fynix-osc-key left
RIGHT      script-message fynix-osc-key right
UP         script-message fynix-osc-key up
DOWN       script-message fynix-osc-key down
ESC        script-message fynix-osc-key esc
Q          script-message fynix-osc-key q
BACKSPACE  script-message fynix-osc-key back
MBTN_LEFT  script-message fynix-osc-key click
